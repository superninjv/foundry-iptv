name: Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint + type-check the Next.js app and TypeScript services
  # ---------------------------------------------------------------------------
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Docker build (no push) — verify Dockerfiles compile
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build root Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: foundry-iptv:${{ github.sha }}

      - name: Build ts2hls Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: ./services/ts2hls
          file: ./services/ts2hls/Dockerfile
          push: false
          tags: foundry-ts2hls:${{ github.sha }}
