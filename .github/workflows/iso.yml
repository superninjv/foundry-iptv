name: Build ISO

on:
  workflow_dispatch:
    inputs:
      skip_docker_cache:
        description: 'Skip Docker layer cache'
        required: false
        default: 'false'
        type: boolean
  push:
    tags: ['v*']

jobs:
  # ---------------------------------------------------------------------------
  # Build the Foundry IPTV ISO (Debian live-build)
  # ---------------------------------------------------------------------------
  build-iso:
    name: Build Foundry IPTV ISO
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install live-build
        run: sudo apt-get update && sudo apt-get install -y live-build

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Build ISO
        run: sudo ./iso/build.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: foundry-iptv-iso
          path: iso/foundry-iptv-*.iso
          retention-days: 30

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: iso/SHA256SUMS

      # On tag push, create a GitHub release with the ISO
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            iso/foundry-iptv-*.iso
            iso/SHA256SUMS
          generate_release_notes: true
